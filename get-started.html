<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    margin: 0;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .lupa-cta {
    display: inline-block;
    padding: 18px 64px;
    background: linear-gradient(135deg, #FF6B9D 0%, #C084FC 30%, #60D5F7 60%, #34D399 100%);
    color: #fff;
    font-family: system-ui, -apple-system, sans-serif;
    font-size: 18px;
    font-weight: 600;
    text-decoration: none;
    border-radius: 14px;
    letter-spacing: 0.3px;
    box-shadow: 0 4px 24px rgba(192,132,252,0.35);
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }
  .lupa-cta:hover {
    transform: translateY(-2px) scale(1.03);
    box-shadow: 0 8px 32px rgba(192,132,252,0.5);
  }
  .lupa-cta:active {
    transform: translateY(0) scale(0.98);
  }
</style>
</head>
<body>
  <a href="https://app.lupaupscaler.com" target="_blank" class="lupa-cta">Get Started</a>
</body>
</html>
